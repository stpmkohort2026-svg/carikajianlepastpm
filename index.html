<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servis Cari Kajian Lepas STPM - 4 Flat Di Dalam Tangan</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;800&family=Orbitron:wght@400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d4ff;
            --secondary: #ff00ff;
            --accent: #ffd700;
            --dark: #050508;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
        }

        /* Three.js Canvas */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Scanlines & Noise */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%
            );
            background-size: 100% 4px;
            z-index: 5;
            pointer-events: none;
            opacity: 0.4;
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 6;
            pointer-events: none;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
            z-index: 7;
            pointer-events: none;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 20;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Hero Text */
        .hero-text {
            text-align: center;
            margin-bottom: 30px;
        }

        .glitch-container {
            position: relative;
            display: inline-block;
        }

        .main-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 50%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0,212,255,0.5);
            animation: glowPulse 2s ease-in-out infinite alternate;
        }

        @keyframes glowPulse {
            from { filter: drop-shadow(0 0 20px rgba(0,212,255,0.8)); }
            to { filter: drop-shadow(0 0 40px rgba(255,0,255,0.8)); }
        }

        .cyber-subtitle {
            margin-top: 20px;
            font-family: 'Orbitron', monospace;
            font-size: 1.3rem;
            letter-spacing: 0.3em;
            color: rgba(255,255,255,0.8);
        }

        /* 3D Cards */
        .cards-container {
            display: flex;
            gap: 25px;
            margin: 40px 0;
            perspective: 2000px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card-3d {
            width: 260px;
            height: 180px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }

        .card-3d:hover {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-front {
            background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(0,0,0,0.3));
            backdrop-filter: blur(10px);
        }

        .card-back {
            background: linear-gradient(135deg, rgba(255,0,255,0.1), rgba(0,0,0,0.3));
            backdrop-filter: blur(10px);
            transform: rotateY(180deg);
        }

        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .card-price {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent);
        }

        /* BUTTON CONTAINER - PALING PENTING */
        .button-container {
            margin-top: 50px;
            text-align: center;
            position: relative;
            z-index: 100;
        }

        /* MAIN CTA BUTTON - BESAR & NAMPAK */
        .main-cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 30px 60px;
            background: linear-gradient(135deg, var(--primary), #0099cc);
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 60px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 10px 40px rgba(0,212,255,0.4),
                0 0 60px rgba(0,212,255,0.2),
                inset 0 1px 0 rgba(255,255,255,0.3);
            animation: buttonPulse 2s infinite, buttonFloat 3s ease-in-out infinite;
            transition: all 0.3s;
        }

        @keyframes buttonPulse {
            0%, 100% { 
                box-shadow: 
                    0 10px 40px rgba(0,212,255,0.4),
                    0 0 60px rgba(0,212,255,0.2);
            }
            50% { 
                box-shadow: 
                    0 15px 50px rgba(0,212,255,0.6),
                    0 0 80px rgba(0,212,255,0.4),
                    0 0 100px rgba(0,212,255,0.2);
            }
        }

        @keyframes buttonFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .main-cta-button:hover {
            transform: scale(1.05) translateY(-5px);
            background: linear-gradient(135deg, #00e5ff, #00b4d8);
            box-shadow: 
                0 20px 60px rgba(0,212,255,0.6),
                0 0 100px rgba(0,212,255,0.4);
        }

        .main-cta-button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255,255,255,0.3) 50%,
                transparent 70%
            );
            transform: rotate(45deg) translateX(-100%);
            transition: transform 0.6s;
        }

        .main-cta-button:hover::before {
            transform: rotate(45deg) translateX(100%);
        }

        .button-arrow {
            font-size: 2rem;
            animation: arrowBounce 1s infinite;
        }

        @keyframes arrowBounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(10px); }
        }

        /* Secondary text under button */
        .button-subtext {
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            letter-spacing: 2px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        /* Loading Screen */
        .loader-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.8s, visibility 0.8s;
        }

        .loader-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-ring {
            width: 100px;
            height: 100px;
            border: 4px solid transparent;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            margin-top: 20px;
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            letter-spacing: 3px;
        }

        /* Music Control */
        .music-control {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .music-control:hover {
            border-color: var(--primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-title {
                font-size: 3rem;
            }
            .main-cta-button {
                padding: 20px 40px;
                font-size: 1.2rem;
            }
            .cards-container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loader-screen" id="loader">
        <div class="loader-ring"></div>
        <div class="loader-text">CARI KAJIAN LEPAS STPM @stpm20266...</div>
    </div>

    <!-- Three.js Canvas -->
    <div id="canvas-container"></div>

    <!-- Effects -->
    <div class="scanlines"></div>
    <div class="noise"></div>
    <div class="vignette"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="hero-text">
            <div class="glitch-container">
                <h1 class="main-title">4 FLAT</h1>
            </div>
            <div class="cyber-subtitle">DI DALAM TANGAN ANDA</div>
        </div>

        <div class="cards-container">
            <div class="card-3d">
                <div class="card-face card-front">
                    <span class="card-icon">📜</span>
                    <h3 class="card-title">SEJARAH</h3>
                    <p style="color: rgba(255,255,255,0.7); font-size: 0.9rem;">4 Kajian</p>
                </div>
                <div class="card-face card-back">
                    <span class="card-icon">💎</span>
                    <div class="card-price">RM3</div>
                </div>
            </div>

            <div class="card-3d">
                <div class="card-face card-front">
                    <span class="card-icon">🇲🇾</span>
                    <h3 class="card-title">PENGAJIAN AM</h3>
                    <p style="color: rgba(255,255,255,0.7); font-size: 0.9rem;">7 Kajian</p>
                </div>
                <div class="card-face card-back">
                    <span class="card-icon">⚡</span>
                    <div class="card-price">RM6</div>
                </div>
            </div>

            <div class="card-3d">
                <div class="card-face card-front">
                    <span class="card-icon">✍️</span>
                    <h3 class="card-title">ADD-ON</h3>
                    <p style="color: rgba(255,255,255,0.7); font-size: 0.9rem;">Servis Tambahan</p>
                </div>
                <div class="card-face card-back">
                    <span class="card-icon">🚀</span>
                    <div class="card-price">RM2-3</div>
                </div>
            </div>
        </div>

        <!-- BUTTON CONTAINER - PALING PENTING -->
        <div class="button-container">
            <a href="harga.html" class="main-cta-button" onclick="goToHarga(event)">
                <span>🛒</span>
                <span>LIHAT SENARAI HARGA</span>
                <span class="button-arrow">→</span>
            </a>
            <div class="button-subtext">Klik untuk melihat pakej lengkap & order</div>
        </div>

        <p style="margin-top: 40px; color: rgba(255,255,255,0.3); font-size: 0.8rem;">
            SERVIS CARI KAJIAN LEPAS STPM © @stpm20266
        </p>
    </div>

    <!-- Scroll Indicator -->
    <div class="scroll-indicator">
        <span>SCROLL</span>
        <span>↓</span>
    </div>

    <!-- Music Control -->
    <div class="music-control" onclick="toggleMusic()">
        <span id="musicIcon">🎵</span>
        <span style="font-size: 0.8rem; color: rgba(255,255,255,0.7);">Music</span>
    </div>

    <!-- Audio -->
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Hide loader
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                initThreeJS();
            }, 1500);
        });

        // Three.js
        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // Particles
            const geometry = new THREE.BufferGeometry();
            const count = 1500;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);

            for(let i = 0; i < count * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 50;
                positions[i+1] = (Math.random() - 0.5) * 50;
                positions[i+2] = (Math.random() - 0.5) * 50;
                
                colors[i] = Math.random() > 0.5 ? 0 : 1;
                colors[i+1] = Math.random() > 0.5 ? 0.8 : 0;
                colors[i+2] = 1;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.08,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            const particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // Wireframe spheres
            const sphere1 = new THREE.Mesh(
                new THREE.IcosahedronGeometry(10, 1),
                new THREE.MeshBasicMaterial({ color: 0x00d4ff, wireframe: true, transparent: true, opacity: 0.1 })
            );
            scene.add(sphere1);

            const sphere2 = new THREE.Mesh(
                new THREE.IcosahedronGeometry(15, 1),
                new THREE.MeshBasicMaterial({ color: 0xff00ff, wireframe: true, transparent: true, opacity: 0.05 })
            );
            scene.add(sphere2);

            camera.position.z = 30;

            // Mouse
            let mouseX = 0, mouseY = 0;
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            function animate() {
                requestAnimationFrame(animate);
                
                particles.rotation.y += 0.001;
                particles.rotation.x += 0.0005;
                
                sphere1.rotation.y += 0.002;
                sphere2.rotation.y -= 0.001;
                
                camera.position.x += (mouseX * 2 - camera.position.x) * 0.05;
                camera.position.y += (mouseY * 2 - camera.position.y) * 0.05;
                camera.lookAt(scene.position);
                
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // Go to harga page
        function goToHarga(e) {
            e.preventDefault();
            document.getElementById('loader').classList.remove('hidden');
            document.querySelector('.loader-text').textContent = 'LOADING...';
            setTimeout(() => {
                window.location.href = 'harga.html';
            }, 1000);
        }

        // Music
        let isPlaying = false;
        const music = document.getElementById('bgMusic');
        function toggleMusic() {
            if(isPlaying) {
                music.pause();
                document.getElementById('musicIcon').textContent = '🎵';
            } else {
                music.play();
                document.getElementById('musicIcon').textContent = '🔊';
            }
            isPlaying = !isPlaying;
        }

        // Text change
        setInterval(() => {
            const texts = ['4 FLAT', 'A+', 'CEMERLANG'];
            const title = document.querySelector('.main-title');
            const current = title.textContent;
            const next = texts[(texts.indexOf(current) + 1) % texts.length];
            title.textContent = next;
        }, 3000);
    </script>
</body>
</html>

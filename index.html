<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servis Cari Kajian Lepas STPM - 4 Flat Di Dalam Tangan</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;800&family=Orbitron:wght@400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d4ff;
            --secondary: #ff00ff;
            --accent: #ffd700;
            --dark: #050508;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
        }

        /* Three.js Canvas */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .scanlines, .noise, .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .scanlines {
            background: linear-gradient(to bottom, rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 4px;
            opacity: 0.4;
        }

        .noise {
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .vignette {
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
            z-index: 7;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 20;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 40px 20px;
        }

        /* TOP NAV BUTTON - SENTIASA NAMPAK */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .nav-button {
            padding: 15px 35px;
            background: linear-gradient(135deg, var(--primary), #0099cc);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 5px 30px rgba(0,212,255,0.4);
            animation: pulse 2s infinite;
            transition: all 0.3s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 5px 30px rgba(0,212,255,0.4); }
            50% { transform: scale(1.05); box-shadow: 0 10px 40px rgba(0,212,255,0.6); }
        }

        .nav-button:hover {
            transform: scale(1.1);
            background: linear-gradient(135deg, #00e5ff, #00b4d8);
        }

        /* Hero Text */
        .hero-text {
            text-align: center;
            margin-top: 100px;
            margin-bottom: 40px;
        }

        .main-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 50%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0,212,255,0.5);
            animation: glowPulse 2s ease-in-out infinite alternate;
        }

        @keyframes glowPulse {
            from { filter: drop-shadow(0 0 20px rgba(0,212,255,0.8)); }
            to { filter: drop-shadow(0 0 40px rgba(255,0,255,0.8)); }
        }

        .cyber-subtitle {
            margin-top: 20px;
            font-family: 'Orbitron', monospace;
            font-size: 1.3rem;
            letter-spacing: 0.3em;
            color: rgba(255,255,255,0.8);
        }

        /* Cards */
        .cards-container {
            display: flex;
            gap: 25px;
            margin: 40px 0;
            perspective: 2000px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card-3d {
            width: 260px;
            height: 180px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }

        .card-3d:hover {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-front {
            background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(0,0,0,0.3));
            backdrop-filter: blur(10px);
        }

        .card-back {
            background: linear-gradient(135deg, rgba(255,0,255,0.1), rgba(0,0,0,0.3));
            backdrop-filter: blur(10px);
            transform: rotateY(180deg);
        }

        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .card-price {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent);
        }

        /* BOTTOM CTA SECTION */
        .cta-section {
            margin-top: 60px;
            text-align: center;
            padding: 40px;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .cta-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        .main-cta-button {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            padding: 25px 50px;
            background: linear-gradient(135deg, var(--accent), #ff8c00);
            border: none;
            border-radius: 60px;
            color: black;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 10px 40px rgba(255,215,0,0.4);
            animation: float 3s ease-in-out infinite;
            transition: all 0.3s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .main-cta-button:hover {
            transform: scale(1.1);
            box-shadow: 0 20px 60px rgba(255,215,0,0.6);
        }

        /* FIXED BOTTOM BUTTON */
        .fixed-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex;
            justify-content: center;
            z-index: 1000;
        }

        .bottom-button {
            padding: 20px 50px;
            background: linear-gradient(135deg, var(--secondary), #cc00cc);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 5px 30px rgba(255,0,255,0.4);
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 5px 30px rgba(255,0,255,0.4); }
            to { box-shadow: 0 10px 50px rgba(255,0,255,0.7); }
        }

        /* Music Control */
        .music-control {
            position: fixed;
            bottom: 100px;
            right: 30px;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 15px 25px;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-title { font-size: 3rem; }
            .cards-container { flex-direction: column; }
            .nav-button { font-size: 0.9rem; padding: 12px 25px; }
            .main-cta-button { font-size: 1rem; padding: 20px 40px; }
        }
    </style>
</head>
<body>
    <!-- TOP NAV BUTTON -->
    <div class="top-nav">
        <a href="harga.html" class="nav-button">
            🛒 LIHAT HARGA & ORDER
        </a>
    </div>

    <!-- Three.js Canvas -->
    <div id="canvas-container"></div>

    <!-- Effects -->
    <div class="scanlines"></div>
    <div class="noise"></div>
    <div class="vignette"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="hero-text">
            <h1 class="main-title" id="mainTitle">4 FLAT</h1>
            <div class="cyber-subtitle">DI DALAM TANGAN ANDA</div>
        </div>

        <div class="cards-container">
            <div class="card-3d">
                <div class="card-face card-front">
                    <span class="card-icon">📜</span>
                    <h3 class="card-title">SEJARAH</h3>
                    <p style="color: rgba(255,255,255,0.7);">4 Kajian Lengkap</p>
                </div>
                <div class="card-face card-back">
                    <span class="card-icon">💎</span>
                    <div class="card-price">RM3</div>
                </div>
            </div>

            <div class="card-3d">
                <div class="card-face card-front">
                    <span class="card-icon">🇲🇾</span>
                    <h3 class="card-title">PENGAJIAN AM</h3>
                    <p style="color: rgba(255,255,255,0.7);">7 Kajian Siap</p>
                </div>
                <div class="card-face card-back">
                    <span class="card-icon">⚡</span>
                    <div class="card-price">RM6</div>
                </div>
            </div>

            <div class="card-3d">
                <div class="card-face card-front">
                    <span class="card-icon">✍️</span>
                    <h3 class="card-title">ADD-ON</h3>
                    <p style="color: rgba(255,255,255,0.7);">Servis Tambahan</p>
                </div>
                <div class="card-face card-back">
                    <span class="card-icon">🚀</span>
                    <div class="card-price">RM2-3</div>
                </div>
            </div>
        </div>

        <!-- MIDDLE CTA -->
        <div class="cta-section">
            <div class="cta-title">✨ SEDIA UNTUK ORDER? ✨</div>
            <a href="harga.html" class="main-cta-button">
                <span>📋</span>
                <span>LIHAT SENARAI HARGA</span>
                <span>→</span>
            </a>
        </div>

        <p style="margin-top: 150px; color: rgba(255,255,255,0.3); font-size: 0.8rem;">
            SERVIS CARI KAJIAN LEPAS STPM © 2026
        </p>
    </div>

    <!-- FIXED BOTTOM BUTTON -->
    <div class="fixed-bottom">
        <a href="harga.html" class="bottom-button">
            🛒 ORDER SEKARANG →
        </a>
    </div>

    <!-- Music Control -->
    <div class="music-control" onclick="toggleMusic()">
        <span id="musicIcon">🎵</span>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Three.js
        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const count = 1500;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);

            for(let i = 0; i < count * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 50;
                positions[i+1] = (Math.random() - 0.5) * 50;
                positions[i+2] = (Math.random() - 0.5) * 50;
                
                colors[i] = Math.random() > 0.5 ? 0 : 1;
                colors[i+1] = Math.random() > 0.5 ? 0.8 : 0;
                colors[i+2] = 1;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.08,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            const particles = new THREE.Points(geometry, material);
            scene.add(particles);

            const sphere1 = new THREE.Mesh(
                new THREE.IcosahedronGeometry(10, 1),
                new THREE.MeshBasicMaterial({ color: 0x00d4ff, wireframe: true, transparent: true, opacity: 0.1 })
            );
            scene.add(sphere1);

            camera.position.z = 30;

            let mouseX = 0, mouseY = 0;
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            function animate() {
                requestAnimationFrame(animate);
                particles.rotation.y += 0.001;
                sphere1.rotation.y += 0.002;
                camera.position.x += (mouseX * 2 - camera.position.x) * 0.05;
                camera.position.y += (mouseY * 2 - camera.position.y) * 0.05;
                camera.lookAt(scene.position);
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        window.addEventListener('load', initThreeJS);

        // Text change
        setInterval(() => {
            const texts = ['4 FLAT', 'A+', 'CEMERLANG'];
            const title = document.getElementById('mainTitle');
            const current = title.textContent;
            const next = texts[(texts.indexOf(current) + 1) % texts.length];
            title.textContent = next;
        }, 3000);

        // Music
        let isPlaying = false;
        function toggleMusic() {
            const music = document.getElementById('bgMusic');
            const icon = document.getElementById('musicIcon');
            if(isPlaying) {
                music.pause();
                icon.textContent = '🎵';
            } else {
                music.play();
                icon.textContent = '🔊';
            }
            isPlaying = !isPlaying;
        }
    </script>
</body>
</html>
